<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} — {% endif %}NextAI Legal</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 16px;
      line-height: 1.7;
      color: #1a1a1a;
      background: #fff;
    }

    header {
      border-bottom: 1px solid #e5e5e5;
      padding: 16px 24px;
    }
    header a {
      text-decoration: none;
      font-weight: 600;
      color: #1a1a1a;
      font-size: 15px;
    }
    header span {
      color: #888;
      margin: 0 6px;
    }

    main {
      max-width: 720px;
      margin: 48px auto;
      padding: 0 24px 80px;
    }

    h1 { font-size: 1.8rem; font-weight: 700; margin-bottom: 24px; }
    h2 { font-size: 1.25rem; font-weight: 600; margin-top: 36px; margin-bottom: 12px; }
    h3 { font-size: 1.05rem; font-weight: 600; margin-top: 28px; margin-bottom: 8px; }
    h4 { font-size: 1rem; font-weight: 600; margin-top: 20px; margin-bottom: 6px; }

    p  { margin-bottom: 14px; }
    ul, ol { margin-bottom: 14px; padding-left: 24px; }
    li { margin-bottom: 4px; }

    a { color: #0066cc; text-decoration: none; }
    a:hover { text-decoration: underline; }

    hr { border: none; border-top: 1px solid #e5e5e5; margin: 32px 0; }

    table { width: 100%; border-collapse: collapse; margin-bottom: 20px; font-size: 0.93rem; }
    th, td { border: 1px solid #ddd; padding: 8px 12px; text-align: left; }
    th { background: #f5f5f5; font-weight: 600; }

    code { font-family: monospace; background: #f4f4f4; padding: 2px 5px; border-radius: 3px; font-size: 0.88em; }
    pre  { background: #f4f4f4; padding: 16px; border-radius: 6px; overflow-x: auto; margin-bottom: 16px; }
    pre code { background: none; padding: 0; }

    strong { font-weight: 600; }

    footer {
      border-top: 1px solid #e5e5e5;
      padding: 20px 24px;
      text-align: center;
      font-size: 13px;
      color: #888;
    }
    footer a { color: #888; }
    footer a:hover { color: #1a1a1a; }
  </style>
</head>
<body>

  <header>
    <a href="https://nextaivn.com">nextaivn.com</a>
    <span>/</span>
    <a href="/">Legal</a>
  </header>

  <main>
    {{ content }}
  </main>

  <footer>
    &copy; {{ "now" | date: "%Y" }} NextAI &mdash;
    <a href="mailto:phu.lam@nextaivn.com">phu.lam@nextaivn.com</a>
  </footer>

</body>
</html>
