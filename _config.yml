title: NextAI — Pháp lý & Chính sách
description: >-
  Chính sách bảo mật, Điều khoản sử dụng và các tài liệu pháp lý cho các
  ứng dụng của NextAI (HKD Pro, …).
url: https://nextaivn.com
baseurl: ""
theme: jekyll-theme-cayman

# Markdown engine — kramdown with GitHub Flavored Markdown so | tables |
# render correctly (default kramdown does NOT parse GFM tables).
markdown: kramdown
kramdown:
  input: GFM
  hard_wrap: false
  syntax_highlighter: rouge

# Pretty URL: apps/hkd-pro/privacy.md → /apps/hkd-pro/privacy
permalink: /:path/:basename

# Show last-updated date on each page
show_downloads: false

defaults:
  - scope:
      path: ""
      type: pages
    values:
      layout: default

# Sass + plugins (built-in to GitHub Pages)
plugins:
  - jekyll-relative-links
  - jekyll-optional-front-matter
  - jekyll-readme-index
  - jekyll-default-layout
  - jekyll-titles-from-headings

# Files to include / exclude
exclude:
  - README.md
  - LICENSE
  - .gitignore
